spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          # TokenRelay forwards the session's access token as a Bearer to every downstream call
          # (no-op for anonymous public routes). The BFF holds the tokens; the browser never sees them.
          default-filters:
            - TokenRelay=
          routes:
            # REST browse/search surface. Keep the /api/v1 prefix (URI versioning) — no rewrite.
            - id: offer-rest
              uri: ${OFFER_SERVICE_URI:http://localhost:8080}
              predicates:
                - Path=/api/v1/offers/**
            # GraphQL endpoint + GraphiQL explorer (§1.6 query side).
            - id: offer-graphql
              uri: ${OFFER_SERVICE_URI:http://localhost:8080}
              predicates:
                - Path=/graphql,/graphiql,/graphiql/**
            # OpenAPI docs + Swagger UI (§1.6 springdoc).
            - id: offer-docs
              uri: ${OFFER_SERVICE_URI:http://localhost:8080}
              predicates:
                - Path=/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
            # Phase 2.1: protected user endpoints (resource server). Auth enforced by the BFF; the
            # relayed Bearer token is validated by user-service.
            - id: user-service
              uri: ${USER_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/v1/users/**
            # Phase 2.3: protected application-tracker endpoints (resource server). Auth enforced by
            # the BFF; the relayed Bearer token is validated by tracker-service.
            - id: tracker-service
              uri: ${TRACKER_SERVICE_URI:http://localhost:8086}
              predicates:
                - Path=/api/v1/tracker/**
  # BFF session store (ADR 0004): Redis-backed reactive WebSession keeps the OAuth2 tokens
  # server-side. The browser only carries the httpOnly SESSION cookie.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  session:
    store-type: redis
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:web-bff}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:web-bff-secret}
            authorization-grant-type: authorization_code
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            # Unified issuer (Phase 2.1). Default localhost:8088 for running via Gradle; compose
            # overrides to http://host.docker.internal:8088 so the browser and in-cluster services
            # agree on the issuer and OIDC discovery works from inside containers.
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/job-search}

# In-process per-client rate limiter (Phase 1.7). Redis-backed distributed limiting is a later step.
gateway:
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    limit-for-period: ${GATEWAY_RATE_LIMIT_PER_PERIOD:100}
    refresh-period: ${GATEWAY_RATE_LIMIT_REFRESH:1s}

# Observability entry point: expose the gateway route view + health for local inspection. The
# gateway endpoint is access-disabled by default; read-only exposes the route view without allowing
# runtime route manipulation.
management:
  endpoints:
    web:
      exposure:
        include: health, gateway
  endpoint:
    gateway:
      access: read-only

server:
  port: 8082

# Where the BFF returns the browser after login/logout — the SPA origin. The gateway hosts no UI of
# its own. In dev the SPA is the Vite server (:5173); set FRONTEND_BASE_URL in other environments
# (e.g. the same origin as the gateway in production).
app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173/}
