# Local infrastructure for job-search — grown incrementally (see docs/phase-1-plan.md).
# Event backbone: Kafka (KRaft, no ZooKeeper) + Apicurio schema registry. Postgres is the
# offer-service canonical store (§1.1), runs with wal_level=logical for Debezium (§1.5). OpenSearch
# is the read model (§1.4); Kafka Connect + Debezium drain the outbox to `offer.published` (§1.5).
# Keycloak (identity provider) + Redis (gateway BFF session store) arrive in Phase 2.0 (auth
# foundation); no service consumes them until 2.1 (ADR 0001 / ADR 0004).

services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: js-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  schema-registry:
    image: apicurio/apicurio-registry-mem:2.6.5.Final
    container_name: js-apicurio
    # Host 8085 (not 8081) to leave 8080/8081 for the offer-/collection-service HTTP ports.
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: prod

  postgres:
    image: postgres:16-alpine
    container_name: js-postgres
    # wal_level=logical + replication slots/senders let Debezium (pgoutput) tail the WAL (§1.5).
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: offers
      POSTGRES_USER: offers
      POSTGRES_PASSWORD: offers
    # Pre-create the per-service databases (users/tracker/notification) on a fresh volume (§2.1).
    volumes:
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offers -d offers"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: js-opensearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Kafka Connect + Debezium (§1.5): tails the Postgres WAL and drains the offer-service outbox to
  # `offer.published`. The image bundles the Postgres connector and the Outbox Event Router SMT.
  kafka-connect:
    image: quay.io/debezium/connect:3.0.0.Final
    container_name: js-kafka-connect
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: offer-connect
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  # One-shot: waits for Connect's REST API, registers the outbox connector, then exits — so
  # "docker compose up" brings the whole CDC path online with no manual curl. It polls itself (curl
  # is guaranteed in this image, not in the connect image) and the PUT is idempotent on the config.
  connect-init:
    image: curlimages/curl:8.11.0
    container_name: js-connect-init
    depends_on:
      kafka-connect:
        condition: service_started
      offer-service:
        condition: service_healthy   # ensures Flyway has created public.outbox before registration
    restart: "no"
    volumes:
      - ./infra/debezium/offer-outbox-connector.json:/connector.json:ro
    entrypoint:
      - "sh"
      - "-c"
      - >
        until curl -sf http://kafka-connect:8083/connectors >/dev/null; do
        echo 'waiting for kafka-connect...'; sleep 3; done;
        curl -sf -X PUT -H 'Content-Type: application/json'
        --data @/connector.json
        http://kafka-connect:8083/connectors/offer-outbox-connector/config

  # Identity provider (Phase 2.0). Imports the committed realm on startup (realm, the web-bff
  # OAuth2 client for Authorization Code + PKCE, realm roles, and a seed test user) so "docker
  # compose up" brings auth fully online with no admin-console clicks. Host 8088 (8080 is taken by
  # offer-service); health endpoint enabled on the 9000 management port.
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: js-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Unified issuer (Phase 2.1): one URL the browser AND the in-cluster services both resolve.
      # Docker Desktop maps host.docker.internal to the host, and 8088 is published, so tokens carry
      # iss=http://host.docker.internal:8088/realms/job-search consistently and OIDC discovery works
      # from inside containers. Backchannel-dynamic lets internal callers also reach it directly.
      KC_HOSTNAME: http://host.docker.internal:8088
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/job-search-realm.json:/opt/keycloak/data/import/job-search-realm.json:ro
    ports:
      - "8088:8080"
    healthcheck:
      # The Keycloak image ships bash but no curl; probe the management health port over /dev/tcp.
      test:
        - "CMD-SHELL"
        - >
          exec 3<>/dev/tcp/localhost/9000 &&
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          cat <&3 | grep -q '\"status\": \"UP\"'
      interval: 10s
      timeout: 5s
      retries: 20

  # Gateway BFF session store (Phase 2.0): Spring Session persists the WebSession (and the
  # server-side OAuth2 tokens) here so the browser holds only an httpOnly cookie (ADR 0004). Also
  # backs distributed gateway rate-limit state. Consumed from 2.1 onward.
  redis:
    image: redis:7-alpine
    container_name: js-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- application services (built from the repo via the shared multi-stage Dockerfile) ---------

  # Reactive multi-source collector (§1.2). Trigger a run with POST /api/v1/collect.
  collection-service:
    build:
      context: .
      args:
        MODULE: collection-service
    image: job-search/collection-service:latest
    container_name: js-collection-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8081:8081"

  # Stateless Kafka->Kafka canonicalizer (§1.3). No HTTP port.
  processing-service:
    build:
      context: .
      args:
        MODULE: processing-service
    image: job-search/processing-service:latest
    container_name: js-processing-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  # Canonical store + OpenSearch read model + transactional outbox (§1.1/1.4/1.5). Flyway creates
  # the offers and outbox tables on startup; the TCP healthcheck signals migrations are done and the
  # web server is accepting requests (connect-init waits on it before registering the connector).
  offer-service:
    build:
      context: .
      args:
        MODULE: offer-service
    image: job-search/offer-service:latest
    container_name: js-offer-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: jdbc:postgresql://postgres:5432/offers
      POSTGRES_USER: offers
      POSTGRES_PASSWORD: offers
      OPENSEARCH_SCHEME: http
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
    ports:
      - "8080:8080"
      - "9090:9090"   # internal gRPC API (offer.v1, §1.6) — exposed for local testing (grpcurl)
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # First protected service (§2.1): servlet OAuth2 resource server. Validates the Keycloak JWT the
  # gateway relays, exposes GET /api/v1/users/me, and provisions the user row in its own `users` DB.
  user-service:
    build:
      context: .
      args:
        MODULE: user-service
    image: job-search/user-service:latest
    container_name: js-user-service
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_ISSUER_URI: http://host.docker.internal:8088/realms/job-search
      POSTGRES_URL: jdbc:postgresql://postgres:5432/users
      POSTGRES_USER: offers
      POSTGRES_PASSWORD: offers
    extra_hosts:
      - "host.docker.internal:host-gateway"   # resolve the unified Keycloak issuer on Linux/CI too
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # Single entry point + BFF (§1.7 / §2.1, ADR 0004): Spring Cloud Gateway routes the browser to
  # offer-service (public browse) and the protected user-service, propagates the correlation id, and
  # rate-limits per client. As the OAuth2 client it runs Authorization Code + PKCE against Keycloak,
  # keeps tokens in a Redis-backed session, and relays them downstream (TokenRelay).
  api-gateway:
    build:
      context: .
      args:
        MODULE: api-gateway
    image: job-search/api-gateway:latest
    container_name: js-api-gateway
    depends_on:
      offer-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      OFFER_SERVICE_URI: http://offer-service:8080
      USER_SERVICE_URI: http://user-service:8080
      KEYCLOAK_ISSUER_URI: http://host.docker.internal:8088/realms/job-search
      KEYCLOAK_CLIENT_SECRET: web-bff-secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"   # resolve the unified Keycloak issuer on Linux/CI too
    ports:
      - "8082:8082"
