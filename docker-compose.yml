# Local infrastructure for job-search — grown incrementally (see docs/phase-1-plan.md).
# Event backbone: Kafka (KRaft, no ZooKeeper) + Apicurio schema registry. Postgres is added for
# the §1.1 walking skeleton (offer-service's canonical store). OpenSearch (§1.4) and
# Kafka-Connect+Debezium (§1.5) arrive later; Keycloak + Redis in Phase 2.

services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: js-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  schema-registry:
    image: apicurio/apicurio-registry-mem:2.6.5.Final
    container_name: js-apicurio
    ports:
      - "8081:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: prod

  postgres:
    image: postgres:16-alpine
    container_name: js-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: offers
      POSTGRES_USER: offers
      POSTGRES_PASSWORD: offers
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offers -d offers"]
      interval: 10s
      timeout: 5s
      retries: 10
